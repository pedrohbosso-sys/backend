<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ativos | SENAI</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div th:insert="~{fragments/header :: header}"></div>

    <main class="senai-main">
        <section class="senai-hero">
            <div class="senai-shell" style="flex-direction:column; align-items:flex-start;">
                <div th:if="${erro}" class="senai-alert senai-alert-error" style="margin-bottom:16px; width:100%;">
                    <p th:text="${erro}"></p>
                </div>
                <div th:if="${sucesso}" class="senai-alert senai-alert-success" style="margin-bottom:16px; width:100%;">
                    <p th:text="${sucesso}"></p>
                </div>
                
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                    <h1 class="senai-title">Ativos Patrimoniais</h1>
                    <a class="senai-button" th:href="@{/ativos/novo}">+ Novo Ativo</a>
                </div>

                <table style="width:100%; margin-top:20px; border-collapse:collapse;">
                    <thead>
                        <tr style="background:#E30613; color:white;">
                            <th style="padding:12px; text-align:left;">Patrimônio</th>
                            <th style="padding:12px; text-align:left;">Descrição</th>
                            <th style="padding:12px; text-align:left;">Localização</th>
                            <th style="padding:12px; text-align:left;">Status</th>
                            <th style="padding:12px; text-align:left;">Valor</th>
                            <th style="padding:12px; text-align:left;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="ativo : ${ativos}" style="border-bottom:1px solid #E5E7EB;">
                            <td style="padding:10px;" th:text="${ativo.numeroPatrimonio}"></td>
                            <td style="padding:10px;" th:text="${ativo.descricao}"></td>
                            <td style="padding:10px;" th:text="${ativo.localizacao}"></td>
                            <td style="padding:10px;" th:text="${ativo.status}"></td>
                            <td style="padding:10px;" th:text="${ativo.valorAquisicao}"></td>
                            <td style="padding:10px;">
                                <a class="senai-button" th:href="@{/ativos/editar/{id}(id=${ativo.id})}">Editar</a>
                                <a style="color:#E30613; margin-left:8px;" th:href="@{/ativos/deletar/{id}(id=${ativo.id})}">Deletar</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div th:insert="~{fragments/footer :: footer}"></div>
</body>
</html>
